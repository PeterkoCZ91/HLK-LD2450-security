; =========================================================================
; ESP32 Security Node - LD2450 Edition
; Target Tracking + Security System
; =========================================================================

[platformio]
default_envs = ld2450_lab

[env]
platform = espressif32 @ 6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs
lib_deps =
    bblanchon/ArduinoJson
    knolleary/PubSubClient
    mathieucarbou/AsyncTCP @ ^3.3.2
    mathieucarbou/ESPAsyncWebServer @ ^3.3.12
    https://github.com/alanswx/ESPAsyncWiFiManager.git
    h2zero/NimBLE-Arduino @ ^2.0.0
    cotestatnt/AsyncTelegram2

; Common build flags shared by all environments
[common]
build_flags =
    -D USE_LD2450
    -I include/ld2450
    -D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -D CONFIG_BT_NIMBLE_MAX_BONDS=3
    -D CONFIG_BT_NIMBLE_ROLE_CENTRAL_DISABLED
    -D CONFIG_BT_NIMBLE_ROLE_OBSERVER_DISABLED

; =========================================================================
; Lab (USB upload, debug)
; =========================================================================
[env:ld2450_lab]
build_flags =
    ${common.build_flags}
    -D LAB_MODE=1
    -D AP_PASS='"changeme"'
    -D FW_VERSION='"v5.5.3"'
    -D CORE_DEBUG_LEVEL=0
build_src_filter =
    +<ld2450/>
lib_deps =
    ${env.lib_deps}
upload_protocol = esptool
upload_speed = 460800
; upload_port = /dev/ttyUSB0

; =========================================================================
; Production (OTA upload)
; =========================================================================
[env:ld2450_prod]
build_flags =
    ${common.build_flags}
    -D LAB_MODE=0
    -D MQTTS_ENABLED
    -D AP_PASS='"changeme"'
    -D FW_VERSION='"v5.5.3"'
build_src_filter =
    +<ld2450/>
lib_deps =
    ${env.lib_deps}
upload_protocol = espota
upload_port = 192.168.1.100       ; <-- change to your device IP
upload_flags = --auth=changeme    ; <-- change to your OTA password
