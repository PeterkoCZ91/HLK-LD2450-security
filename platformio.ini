; =========================================================================
; ESP32 Security Node — LD2450 Edition
; Multi-target tracking + security alarm
; =========================================================================
;
; Quick start:
;   1. Copy include/secrets.h.example to include/secrets.h and fill in your
;      WiFi / MQTT / Telegram credentials and CA cert.
;   2. Optionally copy include/ld2450/known_devices.h.example to
;      include/ld2450/known_devices.h and add your device's MAC.
;   3. Pick an environment:
;        ld2450_lab   — USB upload, plain MQTT (no TLS)
;        ld2450_prod  — OTA upload, MQTTS enabled
;        native       — host-side unit tests (parser regression suite)
;
; TLS MQTT is enabled at runtime when the configured port is 8883.
; Drop -D MQTTS_ENABLED to compile without TLS support entirely.

[platformio]
default_envs = ld2450_lab

[arduino_common]
platform = espressif32 @ 6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs
lib_deps =
    bblanchon/ArduinoJson
    knolleary/PubSubClient
    mathieucarbou/AsyncTCP @ ^3.3.2
    mathieucarbou/ESPAsyncWebServer @ ^3.3.12
    https://github.com/alanswx/ESPAsyncWiFiManager.git
    h2zero/NimBLE-Arduino @ ^2.0.0
    cotestatnt/AsyncTelegram2

[common_build_flags]
build_flags =
    -D USE_LD2450
    -D FW_VERSION='"v5.7.5"'
    -D AP_PASS='"changeme"'
    -D CORE_DEBUG_LEVEL=0
    -I include/ld2450
    ; NimBLE memory optimization (~15-20 KB savings)
    -D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -D CONFIG_BT_NIMBLE_MAX_BONDS=3
    -D CONFIG_BT_NIMBLE_ROLE_CENTRAL_DISABLED
    -D CONFIG_BT_NIMBLE_ROLE_OBSERVER_DISABLED

; =========================================================================
; Lab — USB upload, debug, plain MQTT
; =========================================================================
[env:ld2450_lab]
extends = arduino_common
build_flags =
    ${common_build_flags.build_flags}
    -D LAB_MODE=1
build_src_filter =
    +<ld2450/>
upload_protocol = esptool
upload_speed = 115200
; upload_port = /dev/ttyUSB0     ; uncomment + set your serial port

; =========================================================================
; Production — OTA upload, MQTTS enabled
; =========================================================================
[env:ld2450_prod]
extends = arduino_common
build_flags =
    ${common_build_flags.build_flags}
    -D LAB_MODE=0
    -D MQTTS_ENABLED
build_src_filter =
    +<ld2450/>
upload_protocol = espota
upload_port = 192.168.1.100      ; <-- change to your device IP
upload_flags = --auth=changeme   ; <-- change to your OTA password

; =========================================================================
; Native unit tests (host-side, no Arduino deps)
;   pio test -e native
; =========================================================================
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -I include
    -DUNIT_TEST
test_filter = test_parser
